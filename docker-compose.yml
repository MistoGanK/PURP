services:
  # Servidor de Base de Datos
  db:
    image: mariadb:10.11
    container_name: purp_db
    restart: always
    environment:
      MYSQL_DATABASE: purpdb
      MYSQL_ROOT_PASSWORD: purp2077
      MYSQL_USER: purp_dev
      MYSQL_PASSWORD: purp2077
    volumes:
      - db_data:/var/lib/mysql

  # El Servidor de Aplicación (PHP)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: purp_app
    volumes:
      - .:/var/www
    depends_on:
      - db

  # Servidor Web (Nginx)
  web:
    image: nginx:alpine
    container_name: purp_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  db_data:
